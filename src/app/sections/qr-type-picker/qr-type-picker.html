<nav class="picker" aria-label="QR code type">
  <button
    type="button"
    class="picker__nav picker__nav--left"
    [class.is-hidden]="!canScrollLeft()"
    [attr.aria-hidden]="!canScrollLeft()"
    [disabled]="!canScrollLeft()"
    aria-label="Scroll left"
    (click)="scroll(-1)">
    <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
      <path d="M10 2 L4 8 L10 14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <ul #list class="picker__list" (scroll)="onScroll()">
    @for (t of types; track t.id) {
      <li>
        <button
          type="button"
          class="picker__chip"
          [class.is-selected]="selected() === t.id"
          [attr.aria-pressed]="selected() === t.id"
          (click)="pick(t.id)">
          {{ t.label }}
        </button>
      </li>
    }
  </ul>

  <button
    type="button"
    class="picker__nav picker__nav--right"
    [class.is-hidden]="!canScrollRight()"
    [attr.aria-hidden]="!canScrollRight()"
    [disabled]="!canScrollRight()"
    aria-label="Scroll right"
    (click)="scroll(1)">
    <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
      <path d="M6 2 L12 8 L6 14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</nav>
