<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="QR Studio">
  <rect width="64" height="64" fill="#0d0f14"/>
  <!-- Three QR finder patterns -->
  <g fill="#fbbf24">
    <rect x="8"  y="8"  width="16" height="16"/>
    <rect x="40" y="8"  width="16" height="16"/>
    <rect x="8"  y="40" width="16" height="16"/>
  </g>
  <g fill="#0d0f14">
    <rect x="11" y="11" width="10" height="10"/>
    <rect x="43" y="11" width="10" height="10"/>
    <rect x="11" y="43" width="10" height="10"/>
  </g>
  <g fill="#fbbf24">
    <rect x="13" y="13" width="6" height="6"/>
    <rect x="45" y="13" width="6" height="6"/>
    <rect x="13" y="45" width="6" height="6"/>
  </g>
  <!-- Data dots -->
  <g fill="#e7e3d6">
    <rect x="30" y="30" width="4" height="4"/>
    <rect x="38" y="30" width="4" height="4"/>
    <rect x="46" y="30" width="4" height="4"/>
    <rect x="30" y="38" width="4" height="4"/>
    <rect x="46" y="38" width="4" height="4"/>
    <rect x="30" y="46" width="4" height="4"/>
    <rect x="38" y="46" width="4" height="4"/>
    <rect x="46" y="46" width="4" height="4"/>
  </g>
</svg>
